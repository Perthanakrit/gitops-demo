apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: p-app-set
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: 'https://github.com/Perthanakrit/p-gitops-demo.git'
        revision: HEAD
        directories:
          - path: apps/*/env/*
  template:
    metadata:
      name: '{{path.basename}}-{{path[1]}}'
      namespace: argocd
    spec:
      project: app-demo
      source:
        repoURL: 'https://github.com/Perthanakrit/p-gitops-demo.git'
        targetRevision: HEAD
        # Tracks the exact directory path found by the generator, The "." prepended to path (.path) required by the goTemplate engine
        path: '{{path}}' 
      destination:
        server: 'https://kubernetes.default.svc'
        # Dynamically deploys into "dev-apps" or "prod-apps" based on the environment name
        namespace: '{{path.basename}}-apps'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true